   /* ---------------- Topbar 顶部按钮栏 ---------------- */
    .topbar{
      position: absolute; top:0; left:0; right:0;
      z-index: 40;
      display:flex; flex-wrap:wrap; gap:8px; align-items:center; justify-content:center;
      padding:10px 10px calc(10px + env(safe-area-inset-top));
      background: linear-gradient(to bottom, rgba(0,0,0,.86), rgba(0,0,0,0));
      pointer-events:auto;
    }
    /*-----------------------分组折叠样式--------------------------*/
   .groupFold {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    }

    .groupContent {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 0px;
        margin-top: 0px;

        overflow: hidden;
        max-height: 0;
        opacity: 0;
        transform: translateY(0) scaleY(1);
        transform-origin: top center;
        pointer-events: none;

        transition:
        max-height 0.34s cubic-bezier(0.22, 1, 0.36, 1),
        opacity 0.20s ease,
        transform 0.34s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .groupFold.expanded .groupContent {
        max-height: 1000px;
        opacity: 1;
        transform: translateY(0) scaleY(1);
        pointer-events: auto;
    }

    .groupFold > .foldBtn img {
        transform-origin: center center;
        will-change: transform, filter;
    }

    .groupFold > .foldBtn:active img {
        transform: scale(0.98);
        filter: brightness(1.12);
    }

    .groupFold > .foldBtn.foldPulse img {
        animation: foldIconPop 220ms ease-out;
    }

    @keyframes foldIconPop {
        0%   { transform: scale(1); filter: brightness(1); }
        45%  { transform: scale(1.05); filter: brightness(1.16); }
        100% { transform: scale(1); filter: brightness(1); }
    }

    .subBtn.subPulse img {
        animation: subIconPop 180ms ease-out;
    }

    @keyframes subIconPop {
        0%   { transform: scale(1); filter: brightness(1); }
        45%  { transform: scale(1.04); filter: brightness(1.14); }
        100% { transform: scale(1); filter: brightness(1); }
    }

    .groupContent .subBtn img {
        opacity: 0;
        transform: translateY(-34px);
        transition:
          opacity 120ms linear,
          transform 220ms cubic-bezier(0.22, 0.72, 0.18, 1);
        transition-delay: calc(var(--drop-out-index, 0) * 24ms);
        will-change: transform, opacity;
    }

    .groupFold.expanded .groupContent .subBtn img {
        opacity: 1;
        transform: translateY(0);
        transition-delay: calc(var(--drop-index, 0) * 28ms);
    }

function dataURLToBlob(dataURL){
  const arr = dataURL.split(",");
  const mime = arr[0].match(/:(.*?);/)?.[1] || "image/png";
  const bstr = atob(arr[1]);
  let n = bstr.length;
  const u8arr = new Uint8Array(n);
  while (n--){
    u8arr[n] = bstr.charCodeAt(n);
  }
  return new Blob([u8arr], { type: mime });
}

async function reverseGeocodePlace(lat, lng){
  if (lat == null || lng == null) return null;

  const key = placeCacheKey(lat, lng);
  const cache = readPlaceCache();
  if (cache[key]) return cache[key];

  const url = `https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${encodeURIComponent(lat)}&longitude=${encodeURIComponent(lng)}&localityLanguage=en`;
  const res = await fetch(url);
  if (!res.ok) return null;

  const data = await res.json();
  const place = [
    data.city || data.locality || data.principalSubdivision,
    data.countryName
  ].filter(Boolean).join(", ");

  if (!place) return null;
  cache[key] = place;
  writePlaceCache(cache);
  return place;
}

function locationFallbackText(geo){
  if (!geo?.lat) return "(no location)";
  const accuracy = geo.source === "ip"
    ? "approx"
    : `+/-${Math.round(geo.accuracy_m || 0)}m`;
  return `${geo.lat.toFixed(5)}, ${geo.lng.toFixed(5)} ${accuracy}`;
}

function locationPlaceText(place, geo){
  return place ? `${place} | ${locationFallbackText(geo)}` : locationFallbackText(geo);
}

function fillPlaceText(el, geo){
  if (!geo?.lat){
    el.textContent = "(no location)";
    return;
  }

  el.textContent = locationFallbackText(geo);
  reverseGeocodePlace(geo.lat, geo.lng)
    .then(place=>{
      if (place) el.textContent = locationPlaceText(place, geo);
    })
    .catch(err=>console.warn("reverse geocode failed:", err));
}

async function getGeoOnce({ highAccuracy = true, timeout = 6500 } = {}) {
  const ipGeoFallback = async () => {
    try{
      const res = await fetch("https://ipapi.co/json/");
      if (!res.ok) throw new Error("ip geolocation fetch failed");

      const data = await res.json();
      const lat = Number(data.latitude);
      const lng = Number(data.longitude);
      if (!Number.isFinite(lat) || !Number.isFinite(lng)) return null;

      const place = [data.city, data.country_name].filter(Boolean).join(", ");
      if (place){
        const cache = readPlaceCache();
        cache[placeCacheKey(lat, lng)] = place;
        writePlaceCache(cache);
      }

      return {
        lat,
        lng,
        accuracy_m: 0,
        ts: Date.now(),
        source: "ip"
      };
    }catch(err){
      console.warn("ip geolocation fallback failed:", err);
      return null;
    }
  };

  if (!navigator.geolocation) return await ipGeoFallback();

  const geoErrorName = (err) => {
    if (!err) return "UNKNOWN";
    if (err.code === err.PERMISSION_DENIED || err.code === 1) return "PERMISSION_DENIED";
    if (err.code === err.POSITION_UNAVAILABLE || err.code === 2) return "POSITION_UNAVAILABLE";
    if (err.code === err.TIMEOUT || err.code === 3) return "TIMEOUT";
    return `CODE_${err.code || "UNKNOWN"}`;
  };

  const logGeoError = (label, err) => {
    console.warn(`${label}: ${geoErrorName(err)}`, {
      code: err?.code,
      message: err?.message
    });
  };

  const readPosition = (opts) => new Promise((resolve) => {
    navigator.geolocation.getCurrentPosition(
      (pos) => resolve({
        geo: {
          lat: pos.coords.latitude,
          lng: pos.coords.longitude,
          accuracy_m: pos.coords.accuracy,
          ts: pos.timestamp,
          source: "gps"
        },
        err: null
      }),
      (err) => resolve({ geo: null, err }),
      opts
    );
  });

  const first = await readPosition({
    enableHighAccuracy: highAccuracy,
    timeout,
    maximumAge: 15000
  });
  if (first.geo) return first.geo;
  if (first.err?.code === 1) {
    logGeoError("geolocation denied", first.err);
    showHint("GPS denied, using approximate network location", 1600);
    return await ipGeoFallback();
  }

  const fallback = await readPosition({
    enableHighAccuracy: false,
    timeout: 9000,
    maximumAge: 60000
  });
  if (fallback.geo) return fallback.geo;

  logGeoError("geolocation error", fallback.err || first.err);
  showHint(`GPS unavailable: ${geoErrorName(fallback.err || first.err)}. Trying network location`, 1400);
  return await ipGeoFallback();
}

function pointInPoly(x, y, pts){
  // ray casting
  let inside = false;
  for (let i=0, j=pts.length-1; i<pts.length; j=i++){
    const xi=pts[i].x, yi=pts[i].y;
    const xj=pts[j].x, yj=pts[j].y;
    const intersect = ((yi>y) !== (yj>y)) && (x < (xj-xi)*(y-yi)/(yj-yi+1e-9) + xi);
    if (intersect) inside = !inside;
  }
  return inside;
}

function clearFieldOverlay(){
  clearMagnetPreview(); // ✅ 你已有的函数，清 magnetPreview
}

function drawFieldOverlay(pts, kind, bindText){
  // 画在 magnetPreview 上（持久显示场）
  clearMagnetPreview();
  if (!pts || pts.length < 2) return;

  mctx.save();
  mctx.lineWidth = 2;
  mctx.lineCap = "round";
  mctx.lineJoin = "round";

  // 主描边
  mctx.strokeStyle = "rgba(120,200,255,.78)";
  // loop 填充
  mctx.fillStyle   = "rgba(120,200,255,.12)";

  mctx.beginPath();
  mctx.moveTo(pts[0].x, pts[0].y);
  for (let i=1; i<pts.length; i++) mctx.lineTo(pts[i].x, pts[i].y);

  if (kind === "loop"){
    mctx.closePath();
    mctx.fill();
  }
  mctx.stroke();

  // 角标文字
  mctx.fillStyle = "rgba(255,255,255,.78)";
  mctx.font = "12px system-ui";
  mctx.fillText(`FIELD: ${bindText}`, pts[0].x + 8, pts[0].y - 8);

  mctx.restore();
}

function assignDocksForField(){
  if (!field || !stickers.length) return;
  field.docks.clear();

  const pts = field.pts;

  // bbox
  let minX=Infinity, minY=Infinity, maxX=-Infinity, maxY=-Infinity;
  for (const p of pts){
    minX = Math.min(minX, p.x); minY = Math.min(minY, p.y);
    maxX = Math.max(maxX, p.x); maxY = Math.max(maxY, p.y);
  }

  // spacing（防堆叠）
  const minDist = 30;
  const taken = [];
  const ok = (p)=>{
    for (const q of taken){
      if (Math.hypot(p.x-q.x, p.y-q.y) < minDist) return false;
    }
    return true;
  };

  // PATH：严格在线上（取路径上的点分配）
  if (field.kind === "path"){
    const candidates = pts.filter((_,i)=> i%2===0);
    for (let i=0; i<stickers.length; i++){
      const st = stickers[i];
      const idx = Math.floor(i * (candidates.length-1) / Math.max(1, stickers.length-1));
      const p = candidates[clamp(idx,0,candidates.length-1)];
      field.docks.set(st, { x:p.x, y:p.y });
    }
    return;
  }

  // LOOP：IN/OUT：严格在多边形内/外
  const PAD = 160; // OUT 的外扩范围（先做简单强绑定版，之后可升级成“贴圈外环”）
  const bx0 = (field.bind === "out") ? (minX - PAD) : minX;
  const by0 = (field.bind === "out") ? (minY - PAD) : minY;
  const bx1 = (field.bind === "out") ? (maxX + PAD) : maxX;
  const by1 = (field.bind === "out") ? (maxY + PAD) : maxY;

  for (const st of stickers){
    let found = null;

    for (let k=0; k<1400; k++){
      const x = bx0 + Math.random() * (bx1 - bx0);
      const y = by0 + Math.random() * (by1 - by0);

      const inside = pointInPoly(x,y,pts);
      if (field.bind === "in"  && !inside) continue;
      if (field.bind === "out" &&  inside) continue;

      const cand = {x,y};
      if (!ok(cand)) continue;

      found = cand;
      taken.push(cand);
      break;
    }

    // fallback：避免找不到点卡死
    if (!found){
      found = (field.bind === "in")
        ? { x:(minX+maxX)/2, y:(minY+maxY)/2 }
        : { x:bx1, y:by1 };
      taken.push(found);
    }

    field.docks.set(st, found);
  }
}

    function cssRectToVideoCrop(cssRect){
      const vw = video.videoWidth, vh = video.videoHeight;
      if (!vw || !vh) return null;

      const sr = stage.getBoundingClientRect();
      const sw = sr.width, sh = sr.height;
      const videoAspect = vw / vh;
      const stageAspect = sw / sh;

      let drawW, drawH, offsetX, offsetY;
      if (stageAspect > videoAspect) {
        // stage wider: video width fills stage, top/bottom cropped
        drawW = sw;
        drawH = sw / videoAspect;
        offsetX = 0;
        offsetY = (sh - drawH) / 2;
      } else {
        // stage taller: video height fills stage, left/right cropped
        drawH = sh;
        drawW = sh * videoAspect;
        offsetY = 0;
        offsetX = (sw - drawW) / 2;
      }

      const isMirrored = (facingMode === "user");

      let nx = (cssRect.x - offsetX) / drawW;
      const ny = (cssRect.y - offsetY) / drawH;
      const nw = cssRect.w / drawW;
      const nh = cssRect.h / drawH;

      if (isMirrored) nx = 1 - nx - nw;

      let sx = Math.round(nx * vw);
      let sy = Math.round(ny * vh);
      let swp = Math.round(nw * vw);
      let shp = Math.round(nh * vh);

      sx = clamp(sx, 0, vw-1);
      sy = clamp(sy, 0, vh-1);
      swp = clamp(swp, 1, vw - sx);
      shp = clamp(shp, 1, vh - sy);

      return { sx, sy, sw: swp, sh: shp };
    }

    function alphaHitTest(canvasEl, clientX, clientY){

        const py = (clientY - r.top) * d;
        if (px < 0 || py < 0 || px >= canvasEl.width || py >= canvasEl.height) return false;
        const a = canvasEl.getContext("2d").getImageData(px|0, py|0, 1, 1).data[3];
        return a !== 0;

      const x = (clientX - r.left) / r.width * canvasEl.width;
      const y = (clientY - r.top) / r.height * canvasEl.height;
      return { x, y };

    function applySmear(canvas, cx, cy, radius, vx, vy, strength){
      const ctx = canvas.getContext("2d");
      const w = canvas.width, h = canvas.height;

      const src = ctx.getImageData(0,0,w,h);
      const dst = ctx.createImageData(w,h);
      dst.data.set(src.data);

      const r2 = radius * radius;

      const x0 = Math.max(0, Math.floor(cx - radius));
      const x1 = Math.min(w - 1, Math.ceil(cx + radius));
      const y0 = Math.max(0, Math.floor(cy - radius));
      const y1 = Math.min(h - 1, Math.ceil(cy + radius));

      const len = Math.hypot(vx, vy) || 1;
      const ux = vx / len;
      const uy = vy / len;

      const push = Math.min(36, len) * (0.9 + Math.abs(strength) * 1.3) * Math.sign(strength || 1);

      for (let y = y0; y <= y1; y++){
        for (let x = x0; x <= x1; x++){
          const dx = x - cx, dy = y - cy;
          const d2 = dx*dx + dy*dy;
          if (d2 > r2) continue;

          const d = Math.sqrt(d2);
          const t = 1 - d / radius;
          const falloff = t * t;

          const sx = x - ux * push * falloff;
          const sy = y - uy * push * falloff;

          const ix = Math.max(0, Math.min(w - 1, Math.round(sx)));
          const iy = Math.max(0, Math.min(h - 1, Math.round(sy)));

          const si = (iy*w + ix)*4;
          const di = (y*w + x)*4;

          dst.data[di]     = src.data[si];
          dst.data[di + 1] = src.data[si + 1];
          dst.data[di + 2] = src.data[si + 2];
          dst.data[di + 3] = src.data[si + 3];
        }
      }
      ctx.putImageData(dst, 0,0);
    }

  // ===== Mosaic Brush (Square pixelate in local patch) =====
  function applyMosaicBrush(canvas, cx, cy, radius, blockSizePx){
    const ctx = canvas.getContext("2d", { willReadFrequently:true });
    const w = canvas.width, h = canvas.height;

    const r = Math.max(4, radius|0);
    const bs = Math.max(2, blockSizePx|0);

    const x0 = clamp((cx - r)|0, 0, w-1);
    const y0 = clamp((cy - r)|0, 0, h-1);
    const x1 = clamp((cx + r)|0, 0, w);
    const y1 = clamp((cy + r)|0, 0, h);

    const pw = Math.max(1, x1 - x0);
    const ph = Math.max(1, y1 - y0);

    const patch = ctx.getImageData(x0, y0, pw, ph);

    const dw = Math.max(1, Math.round(pw / bs));
    const dh = Math.max(1, Math.round(ph / bs));

    const tmp1 = document.createElement("canvas");
    tmp1.width = pw; tmp1.height = ph;
    tmp1.getContext("2d").putImageData(patch, 0, 0);

    const tmp2 = document.createElement("canvas");
    tmp2.width = dw; tmp2.height = dh;
    const t2 = tmp2.getContext("2d");
    t2.imageSmoothingEnabled = true;
    t2.clearRect(0,0,dw,dh);
    t2.drawImage(tmp1, 0,0, pw,ph, 0,0, dw,dh);

    const tmp3 = document.createElement("canvas");
    tmp3.width = pw; tmp3.height = ph;
    const t3 = tmp3.getContext("2d");
    t3.imageSmoothingEnabled = false;
    t3.clearRect(0,0,pw,ph);
    t3.drawImage(tmp2, 0,0, dw,dh, 0,0, pw,ph);

    ctx.save();
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI*2);  // 圆形笔刷
    // 方形笔刷就改成：ctx.rect(cx-r, cy-r, 2*r, 2*r);
    ctx.clip();

    ctx.drawImage(tmp3, x0, y0);
    ctx.restore();
  }

  // ===== Local Blur Brush =====
  function applyLocalBlurBrush(canvas, cx, cy, radius, blurPx){
    const ctx = canvas.getContext("2d");
    const w = canvas.width, h = canvas.height;

    const r  = Math.max(6, radius|0);
    const bp = clamp(blurPx|0, 1, 30);

    const x0 = clamp((cx - r - 2)|0, 0, w-1);
    const y0 = clamp((cy - r - 2)|0, 0, h-1);
    const x1 = clamp((cx + r + 2)|0, 0, w);
    const y1 = clamp((cy + r + 2)|0, 0, h);

    const pw = Math.max(1, x1 - x0);
    const ph = Math.max(1, y1 - y0);

    const tmp = document.createElement("canvas");
    tmp.width = pw; tmp.height = ph;
    const tctx = tmp.getContext("2d");
    tctx.drawImage(canvas, x0, y0, pw, ph, 0, 0, pw, ph);

    ctx.save();
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI*2);
    // 方形笔刷就改成：ctx.rect(cx-r, cy-r, 2*r, 2*r);
    ctx.clip();

    ctx.filter = `blur(${bp}px)`;
    ctx.drawImage(tmp, x0, y0);

    ctx.restore();
  }


    function captureStickerState(st){
      if (!st?.el) return null;
      const ctx = st.el.getContext("2d");
      let imageData = null;
      try{
        imageData = ctx.getImageData(0,0, st.el.width, st.el.height);
      }catch{}
      return {
        imageData,
        canvasW: st.el.width,
        canvasH: st.el.height,
        x: st.x,
        y: st.y,
        w: st.w,
        h: st.h,
        scale: st.scale,
        rot: st.rot,
        blurPx: st.blurPx || 0,
        sideOn: !!st.sideOn
      };
    }

    function restoreStickerState(st, snap){
      if (!st?.el || !snap) return false;

      st.x = snap.x;
      st.y = snap.y;
      st.w = snap.w;
      st.h = snap.h;
      st.scale = snap.scale;
      st.rot = snap.rot;
      st.blurPx = snap.blurPx || 0;
      st.sideOn = !!snap.sideOn;

      st.el.style.left = st.x + "px";
      st.el.style.top = st.y + "px";
      st.el.style.width = st.w + "px";
      st.el.style.height = st.h + "px";

      if (snap.canvasW && snap.canvasH && (st.el.width !== snap.canvasW || st.el.height !== snap.canvasH)){
        st.el.width = snap.canvasW;
        st.el.height = snap.canvasH;
      }

      if (snap.imageData){
        st.el.getContext("2d").putImageData(snap.imageData, 0, 0);
      }

      applyTransform(st);
      applyStickerCssFilter(st);
      st.el.classList.add("selected");
      return true;
    }

    function pushUndoForSelected(){
      if (!selected) return false;
      const snap = captureStickerState(selected);
      if (!snap) return false;
      paintUndoStack.push(snap);
      paintRedoStack = [];
      if (paintUndoStack.length > 24) paintUndoStack.shift();
      return true;
    }

    function undoSelectedSticker(){
      if (!selected || paintUndoStack.length === 0) return false;
      const current = captureStickerState(selected);
      const prev = paintUndoStack.pop();
      if (current) paintRedoStack.push(current);
      if (paintRedoStack.length > 24) paintRedoStack.shift();
      restoreStickerState(selected, prev);
      showHint("undo", 650);
      return true;
    }

    function redoSelectedSticker(){
      if (!selected || paintRedoStack.length === 0) return false;
      const current = captureStickerState(selected);
      const next = paintRedoStack.pop();
      if (current) paintUndoStack.push(current);
      if (paintUndoStack.length > 24) paintUndoStack.shift();
      restoreStickerState(selected, next);
      showHint("redo", 650);
      return true;
    }

// 快速模糊：用 ctx.filter（性能好，iOS 也支持）
function applyGaussianBlur(px){
  if (!selected) return;
  if (!pushUndoForSelected()) return;

  const c = selected.el;
  const ctx = c.getContext("2d");
  const tmp = document.createElement("canvas");
  tmp.width = c.width;
  tmp.height = c.height;

  const tctx = tmp.getContext("2d");
  tctx.clearRect(0,0,tmp.width,tmp.height);
  tctx.drawImage(c, 0,0);

  ctx.save();
  ctx.clearRect(0,0,c.width,c.height);
  ctx.filter = `blur(${px}px)`;
  ctx.drawImage(tmp, 0,0);
  ctx.restore();
}

function applyBlackWhite(){
  if (!selected) return;
  if (!pushUndoForSelected()) return;

  const c = selected.el;
  const ctx = c.getContext("2d", { willReadFrequently: true });
  const img = ctx.getImageData(0,0,c.width,c.height);
  const d = img.data;

  for (let i=0; i<d.length; i+=4){
    const a = d[i+3];
    if (a === 0) continue;
    const r = d[i], g = d[i+1], b = d[i+2];
    // 更接近人眼的灰度
    const y = (0.2126*r + 0.7152*g + 0.0722*b) | 0;
    d[i] = d[i+1] = d[i+2] = y;
  }
  ctx.putImageData(img, 0,0);
}

    // amount: 0~1，建议 0.1~0.35
    function applyNoise(amount){
      if (!selected) return;
      if (!pushUndoForSelected()) return;

      const c = selected.el;
      const ctx = c.getContext("2d", { willReadFrequently: true });
      const img = ctx.getImageData(0,0,c.width,c.height);
      const d = img.data;

      const amp = Math.max(0, Math.min(1, amount)) * 255;

      for (let i=0; i<d.length; i+=4){
        const a = d[i+3];
        if (a === 0) continue;
        const n = (Math.random()*2 - 1) * amp;
        d[i]   = clamp(d[i]   + n, 0, 255);
        d[i+1] = clamp(d[i+1] + n, 0, 255);
        d[i+2] = clamp(d[i+2] + n, 0, 255);
      }
      ctx.putImageData(img, 0,0);
    }

    function ensureCanvasPadding(st, padPx){
      if (!st?.el || padPx <= 0) return;

      const c = st.el;
      const cssW = st.w;
      const dpr = c.width / cssW;

      const pad = Math.ceil(padPx * dpr);

      const needW = c.width + pad * 2;
      const needH = c.height + pad * 2;

      const out = document.createElement("canvas");
      out.className = "sticker";
      out.width = needW;
      out.height = needH;

      out.style.left = c.style.left;
      out.style.top  = c.style.top;
      out.style.width  = (st.w + padPx * 2) + "px";
      out.style.height = (st.h + padPx * 2) + "px";
      out.style.transform = c.style.transform;
      out.style.filter = c.style.filter;
      out.style.borderRadius = c.style.borderRadius;
      out.style.border = c.style.border;

      const ctx = out.getContext("2d");
      ctx.drawImage(c, pad, pad);

      c.replaceWith(out);
      st.el = out;

      st.x -= padPx;
      st.y -= padPx;
      st.w += padPx * 2;
      st.h += padPx * 2;

      out.style.left = st.x + "px";
      out.style.top  = st.y + "px";

      attachStickerInteractions(st);

      if (selected === st) out.classList.add("selected");

    // ===== Edge -> Side Extrude =====

    // 提取“边缘像素”canvas：只保留 alpha 边界的颜色
    function buildEdgeCanvas(srcCanvas){
      const w = srcCanvas.width, h = srcCanvas.height;
      const sctx = srcCanvas.getContext("2d", { willReadFrequently: true });
      const src = sctx.getImageData(0,0,w,h);
      const sd = src.data;

      const out = document.createElement("canvas");
      out.width = w; out.height = h;
      const octx = out.getContext("2d", { willReadFrequently: true });
      const edge = octx.createImageData(w,h);
      const ed = edge.data;

      const A_TH = 8; // alpha 阈值：避免半透明噪点被当边缘

      function alphaAt(x,y){
        if (x<0||y<0||x>=w||y>=h) return 0;
        return sd[(y*w + x)*4 + 3];
      }

      for (let y=0; y<h; y++){
        for (let x=0; x<w; x++){
          const i = (y*w + x)*4;
          const a = sd[i+3];
          if (a <= A_TH) continue;

          // 4 邻域只要有一个是透明 => 这是边缘
          const n0 = alphaAt(x-1,y) <= A_TH;
          const n1 = alphaAt(x+1,y) <= A_TH;
          const n2 = alphaAt(x,y-1) <= A_TH;
          const n3 = alphaAt(x,y+1) <= A_TH;

          if (n0 || n1 || n2 || n3){
            ed[i]   = sd[i];
            ed[i+1] = sd[i+1];
            ed[i+2] = sd[i+2];
            ed[i+3] = a; // 保留原 alpha
          }
        }
      }

      octx.putImageData(edge, 0,0);
      return out;
    }

    function getEdgeAverageColor(srcCanvas){
      const edge = buildEdgeCanvas(srcCanvas);
      const ctx = edge.getContext("2d", { willReadFrequently:true });
      const img = ctx.getImageData(0,0,edge.width,edge.height).data;

      let r=0,g=0,b=0, wsum=0;
      for (let i=0; i<img.length; i+=4){
        const a = img[i+3];
        if (a === 0) continue;
        const w = a / 255;
        r += img[i] * w;
        g += img[i+1] * w;
        b += img[i+2] * w;
        wsum += w;
      }
      if (!wsum) return { r:180, g:180, b:180 }; // fallback
      return { r: (r/wsum)|0, g:(g/wsum)|0, b:(b/wsum)|0 };
    }

      const ctx = c.getContext("2d");
      ctx.setTransform(1,0,0,1,0,0);
      ctx.clearRect(0,0,c.width,c.height);  // ✅ 先清空，避免脏残留
      ctx.drawImage(base, 0, 0);
    }

function applySideExtrude(thickness=18, dx=1, dy=1, darken=0.35, isPreview=false){
  if (!selected) return;

  // 只有“正式 apply”才入 undo
  if (!isPreview){
    if (!pushUndoForSelected()) return;
  }

  // padding 只在“正式 apply”时做；preview 不要反复换 canvas
  if (!isPreview){
    const padCss = Math.ceil(thickness * (Math.max(Math.abs(dx), Math.abs(dy)) + 1) + 6);
    ensureCanvasPadding(selected, padCss);
  }

  const c = selected.el;
  const w = c.width, h = c.height;

  const base = document.createElement("canvas");
  base.width = w; base.height = h;
  base.getContext("2d").drawImage(c, 0, 0);

  const edgeCol = getEdgeAverageColor(base);

  const ctx = c.getContext("2d");
  ctx.clearRect(0,0,w,h);

  for (let i = thickness; i >= 1; i--){
    const ox = i * dx;
    const oy = i * dy;

    ctx.save();
    ctx.globalCompositeOperation = "source-over";
    ctx.drawImage(base, ox, oy);

    ctx.globalCompositeOperation = "destination-out";
    ctx.drawImage(base, 0, 0);

    const t = i / thickness;
    
    //平均色
    //ctx.globalCompositeOperation = "source-atop";
    //ctx.fillStyle = `rgba(${edgeCol.r},${edgeCol.g},${edgeCol.b},${0.20 + 0.30*t})`;
    //ctx.fillRect(ox, oy, w, h);

    if (darken > 0){
      ctx.globalCompositeOperation = "source-atop";
    //ctx.fillStyle = `rgba(0,0,0,${darken * (0.06 + 0.18*t)})`;
      
      ctx.fillStyle = `rgba(0,0,0,${(darken / thickness) * (0.06 + 0.18*t)})`;
      ctx.fillRect(ox, oy, w, h);
    }

    ctx.restore();
  }

  ctx.globalCompositeOperation = "source-over";
  ctx.drawImage(base, 0, 0);

  selected.sideOn = true;
  applyStickerCssFilter(selected);
}

    stage.addEventListener("touchstart", (e)=>{
      if (!selected) return;
      if (e.touches.length === 2){
        e.preventDefault();
        const t1 = e.touches[0], t2 = e.touches[1];
        const dx = t2.clientX - t1.clientX;
        const dy = t2.clientY - t1.clientY;
        gesture.active = true;
        gesture.startDist = Math.hypot(dx,dy);
        gesture.startAng  = Math.atan2(dy,dx);
        gesture.baseScale = selected.scale;
        gesture.baseRot   = selected.rot;
      }
    }, { passive:false });

    stage.addEventListener("touchmove", (e)=>{
      if (!gesture.active || !selected) return;
      if (e.touches.length !== 2) return;
      e.preventDefault();

      const t1 = e.touches[0], t2 = e.touches[1];
      const dx = t2.clientX - t1.clientX;
      const dy = t2.clientY - t1.clientY;

      const dist = Math.hypot(dx,dy);
      const ang  = Math.atan2(dy,dx);

      const scale = gesture.baseScale * (dist / Math.max(1, gesture.startDist));
      const rot   = gesture.baseRot + (ang - gesture.startAng);

      selected.scale = clamp(scale, 0.2, 6);
      selected.rot = rot;
      applyTransform(selected);
    }, { passive:false });

    stage.addEventListener("touchend", ()=>{ gesture.active = false; });
    stage.addEventListener("touchcancel", ()=>{ gesture.active = false; });

    // ✅ tap 判定：避免轻微移动造成混乱
    let stageTap = { down:false, x:0, y:0, id:null };
    const TAP_MOVE_THRESHOLD = 10;

    stage.addEventListener("pointerdown", (e)=>{
    if (e.target.closest("#sidebar")) return; 
      if (
        e.target.closest(".topbar") ||
        e.target.closest("#editbar") ||
        e.target.closest("#gridbar") ||  
        e.target.closest("#libPanelWrap")
      ) return;

      if (!video.srcObject) { showHint("Click Start Camera first", 900); return; }

      if (e.target.closest(".sticker")) return;

      if (editbar.style.display === "flex") {
        editbar.style.display = "none";
        showHint("exit Edit", 800);
        return;
      }
      // ---- MAGNET MODE (v2: hand-draw) ----
      if (captureMode === "magnet"){
        e.preventDefault();

        fieldDrawing = true;
        fieldPts = [];

        const p = localPointFromClient(e.clientX, e.clientY);
        fieldPts.push({ x:p.x, y:p.y });

        // 先画一个 draft
        const kind = magnetShape;
        drawFieldOverlay(fieldPts, kind, magnetBind.toUpperCase());
        return;
      }
      stageTap.down = true;
      stageTap.x = e.clientX;
      stageTap.y = e.clientY;
      stageTap.id = e.pointerId;

      if (captureMode !== "mp"){
        e.preventDefault();
        pointerDown = true;

        const p = localPointFromClient(e.clientX, e.clientY);
        startPt = p;

        roi = { x:p.x, y:p.y, w:1, h:1 };
        path = [ {x:p.x, y:p.y} ];

        showROI(roi);
        if (captureMode === "draw") drawPathPreview(path);
      }
    }, { passive:false });

    stage.addEventListener("pointermove", (e)=>{
      // ---- MAGNET MODE DRAW (v2) ----
      if (captureMode === "magnet" && fieldDrawing){
        e.preventDefault();

        const p = localPointFromClient(e.clientX, e.clientY);
        const last = fieldPts[fieldPts.length - 1];

        // 采样间隔：防止点太密
        if (!last || Math.hypot(p.x-last.x, p.y-last.y) > 3){
          fieldPts.push({ x:p.x, y:p.y });
        }

      const kind = magnetShape;
      drawFieldOverlay(fieldPts, kind, magnetBind.toUpperCase());
        return;
      }
      if (!pointerDown || !startPt) return;
      e.preventDefault();

      const p = localPointFromClient(e.clientX, e.clientY);

      if (captureMode === "rect" || captureMode === "grid"){
        const x = Math.min(startPt.x, p.x);
        const y = Math.min(startPt.y, p.y);
        const w = Math.abs(p.x - startPt.x);
        const h = Math.abs(p.y - startPt.y);
        roi = {
          x: clamp(x, 0, startPt.W-1),
          y: clamp(y, 0, startPt.H-1),
          w: clamp(w, 1, startPt.W),
          h: clamp(h, 1, startPt.H)
        };
        showROI(roi);
      } else if (captureMode === "draw"){
        path.push({x:p.x, y:p.y});
        let minX=Infinity, minY=Infinity, maxX=-Infinity, maxY=-Infinity;
        for (const pt of path){
          minX = Math.min(minX, pt.x); minY = Math.min(minY, pt.y);
          maxX = Math.max(maxX, pt.x); maxY = Math.max(maxY, pt.y);
        }
        roi = { x:minX, y:minY, w:(maxX-minX), h:(maxY-minY) };
        showROI(roi);
        drawPathPreview(path);
      }
    }, { passive:false });

    stage.addEventListener("pointerup", async (e)=>{
      // ✅ MP：pointerup 做 tap 判定 -> 触发分割
      if (captureMode === "mp"){
        if (stageTap.down && e.pointerId === stageTap.id){
          const dx = e.clientX - stageTap.x;
          const dy = e.clientY - stageTap.y;
          const moved = Math.hypot(dx,dy) > TAP_MOVE_THRESHOLD;
          stageTap.down = false;

          if (!moved){
            await handleMediaPipeTap(e);
          }
        }
        return;
      }

      // ---- MAGNET MODE APPLY (v2: create field + docks) ----
      if (captureMode === "magnet"){
        if (!fieldDrawing) return;
        e.preventDefault();
        fieldDrawing = false;

        // 点太少：取消
        if (fieldPts.length < 8){
          fieldPts = [];
          clearFieldOverlay();
          showHint("too short", 700);
          return;
        }

        const kind = magnetShape;
        const bind = magnetBind;

        // LOOP：强制闭合（把起点补到末尾）
        if (kind === "loop"){
          const a = fieldPts[0], b = fieldPts[fieldPts.length - 1];
          if (Math.hypot(a.x-b.x, a.y-b.y) > 10){
            fieldPts.push({ x:a.x, y:a.y });
          }
        }

        field = {
          kind,
          bind,
          pts: fieldPts.slice(),
          docks: new Map(),
          strength: 980,
          swirl: 2.4,
          damping: 0.86
        };

        // ✅ 强绑定：给每个 sticker 分配 dock 点（严格 in/out/on）
        assignDocksForField();

        // ✅ 场持久显示：保留在 magnetPreview 上
        drawFieldOverlay(field.pts, field.kind, magnetBind.toUpperCase());

        // ✅ 即使 Gravity OFF，也要让它动起来
        startGravityLoop();

        showHint(kind === "loop" ? ("FIELD " + magnetBind.toUpperCase()) : "FIELD ON PATH", 900);
        return;
      }

      // RECT/DRAW：原逻辑
      if (!pointerDown) return;
      e.preventDefault();
      pointerDown = false;

      if (!roi || roi.w < 8 || roi.h < 8){
        hideROI();
        roi = null; path = []; startPt = null;
        clearPathPreview();
        return;
      }

    if (captureMode === "grid"){
      pendingGridRect = { ...roi };
      gridbar.style.display = "flex";

      showRoiGridPreview(true);
      updateRoiGridPreview();

      console.log("GRID branch fired. display =", getComputedStyle(gridbar).display);


      showHint("Click done after setting rows/columns", 900);
      // GRID 这里先不 hideROI，让你看到外框
    } else if (captureMode === "rect"){
      await createStickerFromROI(roi, null);
      hideROI();
    } else if (captureMode === "draw"){
      await createStickerFromROI(roi, (path.length>=2 ? path : null));
      hideROI();
    }


    if (captureMode !== "grid"){
      roi = null; path = []; startPt = null;
      clearPathPreview();
    } else {
      // GRID：保留 roiBox 外框，等 done/cancel
      roi = null; path = []; startPt = null;
      clearPathPreview();
    }

    }, { passive:false });

    stage.addEventListener("pointercancel", ()=>{
      stageTap.down = false;
      pointerDown = false;
      hideROI();
      roi = null; path = []; startPt = null;
      clearPathPreview();
    });

    async function createStickerFromROI(rect, pathPoints){
      const crop = cssRectToVideoCrop(rect);
      if (!crop) return;

      const dpr = Math.max(1, Math.min(window.devicePixelRatio || 1, 3));
      const src = document.createElement("canvas");
      src.width  = Math.round(rect.w * dpr);
      src.height = Math.round(rect.h * dpr);
      const ctx = src.getContext("2d");
      ctx.imageSmoothingEnabled = true;
      ctx.clearRect(0,0,src.width, src.height);

      if (pathPoints && pathPoints.length >= 2){
        ctx.save();
        ctx.scale(dpr, dpr);
        ctx.beginPath();
        ctx.moveTo(pathPoints[0].x - rect.x, pathPoints[0].y - rect.y);
        for (const p of pathPoints) ctx.lineTo(p.x - rect.x, p.y - rect.y);
        ctx.closePath();
        ctx.clip();

        const frameCanvas = getVideoFrameCanvas();
        if (!frameCanvas){ showHint("Video not ready", 900); return; }
        ctx.drawImage(frameCanvas, crop.sx, crop.sy, crop.sw, crop.sh, 0, 0, rect.w, rect.h);
        ctx.restore();
      } else {
        const frameCanvas = getVideoFrameCanvas();
        if (!frameCanvas){ showHint("Video not ready", 900); return; }
        ctx.drawImage(frameCanvas, crop.sx, crop.sy, crop.sw, crop.sh, 0, 0, src.width, src.height);
      }

      addStickerFromCanvas(src, rect);
      showHint("done", 1200);
    }

    async function createGridFromROI(rect, rows, cols){
  const crop = cssRectToVideoCrop(rect);
  if (!crop) return;

  // 用视频真实像素裁切（最稳）
  const frameCanvas = getVideoFrameCanvas();
  if (!frameCanvas){
    showHint("Video not ready", 900);
    return;
  }

  const dpr = Math.max(1, Math.min(window.devicePixelRatio || 1, 3));

  // 先把“大框”整块画出来（像你 rect 截取那样）
  const big = document.createElement("canvas");
  big.width  = Math.round(rect.w * dpr);
  big.height = Math.round(rect.h * dpr);

  const bctx = big.getContext("2d");
  bctx.imageSmoothingEnabled = true;
  bctx.clearRect(0,0,big.width,big.height);

  // 从 frameCanvas 上裁切 crop（crop 是视频像素坐标）
  // frameCanvas 的尺寸就是 video.videoWidth/Height
  bctx.drawImage(
    frameCanvas,
    crop.sx, crop.sy, crop.sw, crop.sh,
    0, 0, big.width, big.height
  );

  // 计算每个 cell 的 css 尺寸
  const cellW = rect.w / cols;
  const cellH = rect.h / rows;

  // 每个 cell 在 big canvas 上的像素尺寸
  const cellPW = big.width / cols;
  const cellPH = big.height / rows;

  const gid = "grid_" + (gridGroupSeq++);
  const group = {
    id: gid,
    rect: { ...rect },
    rows, cols,
    cells: [],          // 每个 cell 的“槽位”坐标
    pieces: []          // sticker 对象引用
  };

  // 预先算好每个槽位的位置
  for (let r=0; r<rows; r++){
    for (let c=0; c<cols; c++){
      group.cells.push({
        x: rect.x + c * cellW,
        y: rect.y + r * cellH,
        w: cellW,
        h: cellH
      });
    }
  }

  // 生成碎片
  for (let r=0; r<rows; r++){
    for (let c=0; c<cols; c++){
      const src = document.createElement("canvas");
      src.width = Math.max(1, Math.round(cellPW));
      src.height = Math.max(1, Math.round(cellPH));
      const sctx = src.getContext("2d");
      sctx.clearRect(0,0,src.width,src.height);

      // 从 big canvas 上切片
      sctx.drawImage(
        big,
        c * cellPW, r * cellPH, cellPW, cellPH,
        0, 0, src.width, src.height
      );

      // 放置到对应格子槽位（css 坐标）
      const slot = group.cells[r*cols + c];
      addStickerFromCanvas(src, { x: slot.x, y: slot.y, w: slot.w, h: slot.h });

      // 取到刚刚 push 的最后一个 sticker
      const st = stickers[stickers.length - 1];
      st.groupId = gid;
      st.slotIndex = r*cols + c;
      st.inGrid = true;

      // 让碎片“像拼图一样更像网格”
      st.el.style.borderRadius = "0px";

      group.pieces.push(st);
    }
  }

  gridGroups.push(group);
  showHint(`GRID done (${rows}×${cols})，shake to shuffle`, 1400);
}


    // =========================
    // ✅ MP：永远保留你点到的物体（自动判断需不需要反转）
    // =========================
    async function handleMediaPipeTap(e){
    e.preventDefault?.();
    if (!interactiveSegmenter) { showHint("Model not ready", 800); return; }
    if (isProcessing) return;

    const vRect = video.getBoundingClientRect();
    const { cx: clientX, cy: clientY } = getClientXY(e);
    if (clientX == null || clientY == null) return;

    console.log("tap event", e.type, "client", clientX, clientY);
    console.log("video ready", video.videoWidth, video.videoHeight, "seg", !!interactiveSegmenter);

    // 点击必须落在视频可视区域内
    if (clientX < vRect.left || clientX > vRect.right || clientY < vRect.top || clientY > vRect.bottom) return;

    isProcessing = true;
    try{
    // 点击点在 video DOM（object-fit:cover 的可视区域）内的归一化坐标
    const relativeX = (clientX - vRect.left) / vRect.width;
    const relativeY = (clientY - vRect.top) / vRect.height;
    console.log("relative", relativeX, relativeY);

    const result = await new Promise(resolve => {
    const frameCanvas = getVideoFrameCanvas();
    if (!frameCanvas){
    showHint("Video not ready (wait for camera feed)", 900);
    isProcessing = false;
    return;
    }

    interactiveSegmenter.segment(
    frameCanvas,
    { keypoint: { x: relativeX, y: relativeY } },
    (r)=>resolve(r)
    );

    });

    if (!result?.categoryMask){
      showHint("No mask obtained (try another point)", 900);
      isProcessing = false;
      return;
    }

    // ✅ 使用视频“真实像素尺寸”，不是屏幕尺寸
    const vw = video.videoWidth;
    const vh = video.videoHeight;

    // 把当前帧画到 fullCanvas 上（与 mask 同分辨率）
    const fullCanvas = document.createElement("canvas");
    fullCanvas.width = vw;
    fullCanvas.height = vh;
    const fctx = fullCanvas.getContext("2d", { willReadFrequently: true });
    fctx.drawImage(video, 0, 0, vw, vh);

    // 读像素
    const frameData = fctx.getImageData(0, 0, vw, vh);
    const rgba = frameData.data;

    // 读 mask
    const maskData = result.categoryMask.getAsFloat32Array();

    // ✅ 判断 mask 类型：有些设备给 0/1（像 uint8），有些给 0~1（float）
    let isUintMask = true;
    for (let k = 0; k < 40 && k < maskData.length; k++){
      const v = maskData[k];
      if (v !== 0 && v !== 1) { isUintMask = false; break; }
    }

    const TH = 0.4;

    const isMasked = (idx) => {
      const v = maskData[idx];
      return isUintMask ? (v > 0) : (v >= TH);
    };

    // ✅ 用“点击点”决定保留哪一类（前景/背景）
    const mx = Math.max(0, Math.min(vw - 1, Math.floor(relativeX * vw)));
    const my = Math.max(0, Math.min(vh - 1, Math.floor(relativeY * vh)));
    const mi = my * vw + mx;

    const clickedClass = isMasked(mi);
    console.log("mask clicked:", maskData[mi], "isUint:", isUintMask, "clickedClass:", clickedClass);

    // 只保留跟 clickedClass 相同的像素
    for (let i = 0; i < vw * vh; i++){
      if (isMasked(i) !== clickedClass) rgba[i*4 + 3] = 0;
    }
    fctx.putImageData(frameData, 0, 0);

    // trim 到非透明边界，得到“物体本体”canvas
    const trimmed = trimCanvas(fullCanvas);
    if (!trimmed){
      showHint("Segmented image is empty", 900);
      isProcessing = false;
      return;
    }

    // ✅ 把“视频像素坐标”映射回舞台（object-fit:cover）
    const sw = stage.clientWidth, sh = stage.clientHeight;
    const videoAspect = vw / vh;
    const stageAspect = sw / sh;

    let drawW, drawH, offsetX, offsetY;
    if (stageAspect > videoAspect) {
      // stage wider: video width fills stage, top/bottom cropped
      drawW = sw;
      drawH = sw / videoAspect;
      offsetX = 0;
      offsetY = (sh - drawH) / 2;
    } else {
      // stage taller: video height fills stage, left/right cropped
      drawH = sh;
      drawW = sh * videoAspect;
      offsetY = 0;
      offsetX = (sw - drawW) / 2;
    }

    let nx = Number(trimmed.dataset.originX) / vw;
    const ny = Number(trimmed.dataset.originY) / vh;
    const nw = trimmed.width / vw;
    const nh = trimmed.height / vh;

    // 前置镜像要反过来
    if (facingMode === "user"){
      nx = 1 - nx - nw;
    }

    const cssRect = {
      x: offsetX + nx * drawW,
      y: offsetY + ny * drawH,
      w: nw * drawW,
      h: nh * drawH
    };

    addStickerFromCanvas(trimmed, cssRect);
    showHint("done", 1300);

  } catch(err){
    console.error(err);
    showHint("Error occurred while segmenting (network/model/permission issues)", 1200);
  }
  isProcessing = false;
}


    function trimCanvas(c){
      const ctx = c.getContext("2d");
      const pixels = ctx.getImageData(0,0,c.width,c.height);
      const l = pixels.data.length;
      let bound = { top:null, left:null, right:null, bottom:null };
      let x,y;

      for (let i=0;i<l;i+=4){
        if (pixels.data[i+3] !== 0){
          x = (i/4) % c.width;
          y = ~~((i/4) / c.width);
          if (bound.top === null) bound.top = y;
          if (bound.left === null) bound.left = x;
          else if (x < bound.left) bound.left = x;

          if (bound.right === null) bound.right = x;
          else if (bound.right < x) bound.right = x;

          if (bound.bottom === null) bound.bottom = y;
          else if (bound.bottom < y) bound.bottom = y;
        }
      }
      if (bound.top === null) return null;

      const trimW = bound.right - bound.left + 1;
      const trimH = bound.bottom - bound.top + 1;

      const out = document.createElement("canvas");
      out.width = trimW;
      out.height = trimH;
      out.getContext("2d").drawImage(c, bound.left, bound.top, trimW, trimH, 0,0, trimW, trimH);

      out.dataset.originX = bound.left;
      out.dataset.originY = bound.top;
      return out;
    }
    
async function refreshLibraryUI(){
  const allItems = await loadLibrary();
  const hiddenKeys = getHiddenLibraryKeys();
  const items = libAdminDeleteMode ? allItems : visibleLibraryItems(allItems);
  libList.innerHTML = "";

  if (!items.length){
    libList.innerHTML = `<div class="small" style="opacity:.7;">(empty)</div>`;
    return;
  }

  items.forEach((it, idx)=>{
    const wrap = document.createElement("div");
    wrap.className = "libItem";
    wrap.dataset.libId = it.id || "";
    wrap.dataset.libPath = it.path || "";
    wrap.dataset.libKey = getLibraryItemKey(it);
    wrap.dataset.wasHidden = hiddenKeys.has(wrap.dataset.libKey) ? "1" : "";
    let libItemLongPressTimer = 0;
    let libItemLongPressed = false;

    wrap.addEventListener("pointerdown", (e)=>{
      libItemLongPressed = false;
      clearTimeout(libItemLongPressTimer);
      libItemLongPressTimer = setTimeout(()=>{
        libItemLongPressed = true;
        wrap.classList.toggle("lib-selected");
        showHint(wrap.classList.contains("lib-selected") ? "selected for delete" : "unselected", 650);
      }, 520);
    });

    ["pointerup", "pointercancel", "pointerleave"].forEach(type=>{
      wrap.addEventListener(type, ()=>{
        clearTimeout(libItemLongPressTimer);
      });
    });

    wrap.addEventListener("click", (e)=>{
      if (libItemLongPressed) {
        e.preventDefault();
        return;
      }
      if (wrap.classList.contains("lib-selected")){
        wrap.classList.remove("lib-selected");
        return;
      }
      addStickerFromDataURL(it.image_url || it.dataURL, it.w, it.h);
    });

    wrap.addEventListener("dblclick", (e)=>{
      e.preventDefault();
      wrap.classList.toggle("lib-selected");
    });

    const img = document.createElement("img");
    img.className = "thumb";
    img.src = it.image_url || it.dataURL;
    img.title = `#${idx+1}`;

    const meta = document.createElement("div");
    meta.className = "small";
    meta.style.opacity = "0.78";
    meta.style.marginTop = "4px";

    fillPlaceText(meta, it.geo);

    wrap.appendChild(img);
    wrap.appendChild(meta);
    libList.appendChild(wrap);
  });
}

    async function imageUrlToLocalDataURL(url){
      if (String(url).startsWith("data:")) return url;

      const res = await fetch(url, { mode: "cors", cache: "force-cache" });
      if (!res.ok) throw new Error("image fetch failed");

      const blob = await res.blob();
      return await new Promise((resolve, reject)=>{
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(blob);
      });
    }

    async function addStickerFromDataURL(dataURL, w, h){
      const localDataURL = await imageUrlToLocalDataURL(dataURL).catch((err)=>{
        console.warn("image localize failed, falling back to original url:", err);
        return dataURL;
      });

      const img = new Image();
      if (!String(localDataURL).startsWith("data:")) img.crossOrigin = "anonymous";
      img.src = localDataURL;
      await img.decode().catch(()=>{});

      const rect = stage.getBoundingClientRect();
      const targetW = clamp(w || 160, 60, rect.width * 0.8);
      const targetH = clamp(h || 120, 60, rect.height* 0.8);

      const x = (rect.width - targetW)/2;
      const y = (rect.height - targetH)/2;

      const src = document.createElement("canvas");
      src.width = img.naturalWidth || 512;
      src.height = img.naturalHeight || 512;
      const ctx = src.getContext("2d");
      ctx.drawImage(img, 0,0, src.width, src.height);

      try{
        ctx.getImageData(0, 0, 1, 1);
      }catch(err){
        console.warn("library sticker canvas is tainted; undo pixel edits may not work:", err);
        showHint("Cannot prepare undo for this library image", 1200);
      }

      addStickerFromCanvas(src, { x, y, w: targetW, h: targetH });
      showHint("Placed back", 900);
    }

    (function setupLibScrollbar(){
      const track = document.getElementById("libScrollTrack");
      const thumb = document.getElementById("libScrollThumb");
      if (!track || !thumb || !libPanel) return;

      function updateThumb(){
        const sH = libPanel.scrollHeight;
        const cH = libPanel.clientHeight;
        if (sH <= cH){
          thumb.style.display = "none";
          return;
        }
        thumb.style.display = "block";
        const trackH = track.clientHeight;
        const thumbH = thumb.offsetHeight;
        const maxScroll = sH - cH;
        const ratio = libPanel.scrollTop / maxScroll;
        const top = ratio * (trackH - thumbH);
        thumb.style.top = top + "px";
      }

      libPanel.addEventListener("scroll", updateThumb);

      let dragging = false;
      let startY = 0;
      let startScroll = 0;
      thumb.addEventListener("pointerdown", (e)=>{
        dragging = true;
        startY = e.clientY;
        startScroll = libPanel.scrollTop;
        thumb.setPointerCapture(e.pointerId);
        e.preventDefault();
        e.stopPropagation();
      });
      thumb.addEventListener("pointermove", (e)=>{
        if (!dragging) return;
        const trackH = track.clientHeight;
        const thumbH = thumb.offsetHeight;
        const dy = e.clientY - startY;
        const sH = libPanel.scrollHeight;
        const cH = libPanel.clientHeight;
        const maxScroll = sH - cH;
        const scrollDelta = dy * maxScroll / (trackH - thumbH);
        libPanel.scrollTop = startScroll + scrollDelta;
      });
      thumb.addEventListener("pointerup", (e)=>{
        dragging = false;
        try { thumb.releasePointerCapture(e.pointerId); } catch {}
      });

      // observe panel size and content changes
      const ro = new ResizeObserver(updateThumb);
      ro.observe(libPanel);
      const mo = new MutationObserver(updateThumb);
      mo.observe(libPanel, { childList: true, subtree: true });
      window.addEventListener("resize", updateThumb);
      requestAnimationFrame(updateThumb);
    })();

function shuffleGridGroup(group){
  if (!group?.pieces?.length) return;

  // 随机打乱槽位 index
  const indices = group.cells.map((_, i)=>i);
  for (let i=indices.length-1; i>0; i--){
    const j = (Math.random() * (i+1)) | 0;
    [indices[i], indices[j]] = [indices[j], indices[i]];
  }

  // 把每个 piece 移动到新的槽位，但外框不变
  group.pieces.forEach((st, k)=>{
    const slot = group.cells[indices[k]];
    st.x = slot.x;
    st.y = slot.y;

    st.el.style.transition = "left 180ms ease, top 180ms ease";
    st.el.style.left = st.x + "px";
    st.el.style.top  = st.y + "px";

    // 过一会儿取消 transition，避免影响你后续拖拽手感
    clearTimeout(st._t);
    st._t = setTimeout(()=>{ st.el.style.transition = ""; }, 220);
  });

  showHint("shuffle!", 700);
}

function shuffleAllStickers(swaps = 12){
  const n = stickers.length;
  if (n < 2) return;

  // 记录当前位置
  const pos = stickers.map(st => ({ x: st.x, y: st.y }));

  // 做若干次随机“成对交换”
  const times = Math.min(swaps, n * 2);
  for (let t=0; t<times; t++){
    const a = (Math.random() * n) | 0;
    let b = (Math.random() * n) | 0;
    if (b === a) b = (b + 1) % n;
    [pos[a], pos[b]] = [pos[b], pos[a]];
  }

  // 过渡动画（更像洗牌）
  stickers.forEach((st, i)=>{
    st.x = pos[i].x;
    st.y = pos[i].y;

    st.el.style.transition = "left 180ms ease, top 180ms ease";
    st.el.style.left = st.x + "px";
    st.el.style.top  = st.y + "px";

    clearTimeout(st._tShuffle);
    st._tShuffle = setTimeout(()=>{ st.el.style.transition = ""; }, 220);
  });

  showHint("shuffle!", 700);
}

// =========================
// Gravity Mode (tilt-driven) for all stickers
// =========================
let gravityMode = false;
let shuffleMode = false;

let shakeReady = false;
let tiltReady  = false;

refreshPhysicsUI();

async function ensureShakeReady(){
  if (shakeReady) return true;

  const DME = window.DeviceMotionEvent;
  if (typeof DME?.requestPermission === "function"){
    try{
      const res = await DME.requestPermission();
      if (res !== "granted") return false;
    }catch{
      return false;
    }
  }

  installShake();     // 你已有函数，内部也有防重复锁 shakeInstalled
  shakeReady = true;
  return true;
}

async function ensureTiltReady(){
  if (tiltReady) return true;

  const DOE = window.DeviceOrientationEvent;
  if (typeof DOE?.requestPermission === "function"){
    try{
      const res = await DOE.requestPermission();
      if (res !== "granted") return false;
    }catch{
      return false;
    }
  }

  tiltReady = true;
  return true;
}

let gravityRAF = 0;
let lastT = 0;

// tilt -> force vector（单位：px/s^2）
let tiltAX = 0; // right positive
let tiltAY = 0; // down positive

// iOS 上用 DeviceOrientation 取倾斜更稳定
function onDeviceOrientation(e){
  // gamma: 左右倾斜 [-90..90]，beta: 前后倾斜 [-180..180]
  const g = (typeof e.gamma === "number") ? e.gamma : 0;
  const b = (typeof e.beta  === "number") ? e.beta  : 0;

  // 归一化到 [-1..1]，并限制极端值
  const nx = clamp(g / 35, -1, 1); // 35°左右就满力
  const ny = clamp(b / 35, -1, 1);

  // 转成加速度（越大越“滑”）
  const A = 520; // px/s^2（温和：320~700）
  tiltAX = nx * A;
  tiltAY = ny * A;
}

function startGravityLoop(){
  if (gravityRAF) return;
  lastT = 0;
  gravityRAF = requestAnimationFrame(gravityTick);
}

function stopGravityLoop(){
  if (gravityRAF) cancelAnimationFrame(gravityRAF);
  gravityRAF = 0;
  lastT = 0;

  // 停止时把力归零，让它慢慢停住
  tiltAX = 0;
  tiltAY = 0;
}

function gravityTick(t){
  const dt = lastT ? Math.min(0.033, (t - lastT)/1000) : 0.016;
  lastT = t;

  const W = stage.clientWidth;
  const H = stage.clientHeight;

  // 阻尼 / 反弹（轻量不夸张）
  const linearDamp = 0.90;   // 越小越快停
  const angDamp    = 0.92;
  const bounce     = 0.58;   // 边缘反弹力度
  const maxV       = 1200;   // 速度上限，防止失控

  // 很轻的随机旋转（可关掉：把 jitter=0）
  const jitter = 0.25; // rad/s^2（越大越晃）
  
  for (const st of stickers){
    if (st._physLock || funcCircleOpen) continue;

    // 初始化（兼容旧 sticker）
    st.vx ??= 0; st.vy ??= 0; st.av ??= 0;

    // 1) 倾斜力 -> 速度
    st.vx += tiltAX * dt;
    st.vy += tiltAY * dt;

// 1.5) Field force（MAGNET v2: dock binding）
if (field){
  const dock = field.docks.get(st);
  if (dock){
    const cx = st.x + (st.w * st.scale)/2;
    const cy = st.y + (st.h * st.scale)/2;

    const tx = dock.x;
    const ty = dock.y;

    const dx = tx - cx;
    const dy = ty - cy;
    const d  = Math.hypot(dx,dy) || 1;

    // 越近越柔
    const pull = field.strength * (0.25 + 0.75 * clamp(d/420, 0, 1));

    // radial accel
    const ax = (dx/d) * pull;
    const ay = (dy/d) * pull;

    // swirl（切向）
    const sx = (-dy/d) * pull * field.swirl * 0.16;
    const sy = ( dx/d) * pull * field.swirl * 0.16;

    st.vx += (ax + sx) * dt;
    st.vy += (ay + sy) * dt;

    // 接近 dock 时角速度变小，避免乱抖
    st.av += clamp((sx+sy)/1200, -0.8, 0.8) * dt * clamp(d/240, 0, 1);

    // 阻尼：更容易停住
    st.vx *= field.damping;
    st.vy *= field.damping;

    if (d < 12){
      st.vx *= 0.55;
      st.vy *= 0.55;
    }
  }
}

    // 2) 轻微旋转趋势（速度越大越容易转一点点）
    const sp = Math.hypot(st.vx, st.vy);
    st.av += (Math.sign(st.vx)*0.15 + (Math.random()*2-1)*jitter) * dt * clamp(sp/800, 0, 1);

    // 3) integrate
    st.x += st.vx * dt;
    st.y += st.vy * dt;
    st.rot += st.av * dt;

    // 速度限制
    st.vx = clamp(st.vx, -maxV, maxV);
    st.vy = clamp(st.vy, -maxV, maxV);
    st.av = clamp(st.av, -3.0, 3.0);

    // 边界（用显示尺寸：w/h * scale）
    const w = st.w * st.scale;
    const h = st.h * st.scale;

    if (st.x < 0){ st.x = 0; st.vx = Math.abs(st.vx) * bounce; }
    if (st.y < 0){ st.y = 0; st.vy = Math.abs(st.vy) * bounce; }
    if (st.x + w > W){ st.x = Math.max(0, W - w); st.vx = -Math.abs(st.vx) * bounce; }
    if (st.y + h > H){ st.y = Math.max(0, H - h); st.vy = -Math.abs(st.vy) * bounce; }

    // 阻尼
    st.vx *= linearDamp;
    st.vy *= linearDamp;
    st.av *= angDamp;

    // 应用到 DOM
    st.el.style.left = st.x + "px";
    st.el.style.top  = st.y + "px";
    applyTransform(st);
  }

  // very light collision push（可选：想更省事可以删掉这一段）
  for (let i=0; i<stickers.length; i++){
    const a = stickers[i];
    if (a._physLock) continue;
    const aw = a.w * a.scale, ah = a.h * a.scale;
    const ax1 = a.x, ay1 = a.y, ax2 = a.x + aw, ay2 = a.y + ah;

    for (let j=i+1; j<stickers.length; j++){
      const b = stickers[j];
      if (b._physLock) continue;
      const bw = b.w * b.scale, bh = b.h * b.scale;
      const bx1 = b.x, by1 = b.y, bx2 = b.x + bw, by2 = b.y + bh;

      if (ax2 < bx1 || ax1 > bx2 || ay2 < by1 || ay1 > by2) continue;

      const overlapX = Math.min(ax2, bx2) - Math.max(ax1, bx1);
      const overlapY = Math.min(ay2, by2) - Math.max(ay1, by1);

      const push = 0.5; // 推开力度（0.3~0.8）
      if (overlapX < overlapY){
        const dir = (a.x + aw/2) < (b.x + bw/2) ? -1 : 1;
        const d = overlapX * push;
        a.x += dir * d;
        b.x -= dir * d;
        a.vx *= 0.96; b.vx *= 0.96;
      }else{
        const dir = (a.y + ah/2) < (b.y + bh/2) ? -1 : 1;
        const d = overlapY * push;
        a.y += dir * d;
        b.y -= dir * d;
        a.vy *= 0.96; b.vy *= 0.96;
      }

      a.el.style.left = a.x + "px";
      a.el.style.top  = a.y + "px";
      b.el.style.left = b.x + "px";
      b.el.style.top  = b.y + "px";
    }
  }

    const needLoop = gravityMode || !!field;
    if (needLoop){
      gravityRAF = requestAnimationFrame(gravityTick);
    }else{
      stopGravityLoop();
    }
}

  if (typeof DOE !== "undefined" && typeof DOE.requestPermission === "function"){

// iOS / Android: devicemotion
let lastShakeAt = 0;
let shakeInstalled = false;
function installShake(){
  if (shakeInstalled) return;     // ✅ 防重复
  shakeInstalled = true;

  if (!("DeviceMotionEvent" in window)) return;

  const TH = 16;      // 阈值（可调：12~22）
  const GAP = 650;    // 防抖间隔

  window.addEventListener("devicemotion", (e)=>{
    //showHint("motion event!", 300);
    const now = Date.now();
    if (now - lastShakeAt < GAP) return;

    const a = e.accelerationIncludingGravity;
    if (!a) return;

    const mag = Math.sqrt((a.x||0)**2 + (a.y||0)**2 + (a.z||0)**2);
    if (mag > TH){
      lastShakeAt = now;

      // ✅ 1) Shuffle ON：洗全场
      if (shuffleMode){
        shuffleAllStickers(Math.max(8, Math.round(stickers.length * 0.6)));
        return;
      }

      // ✅ 2) Shuffle OFF：维持原逻辑（只洗 grid）
      shuffleAllGrids();
    }
  }, { passive:true });
}

// iOS 13+ 可能要用户手势授权 motion
async function requestMotionPermissionIfNeeded(){
  const DME = window.DeviceMotionEvent;
  if (typeof DME?.requestPermission === "function"){
    try{
      const res = await DME.requestPermission();
      if (res !== "granted") showHint("Motion permission not enabled, cannot shake", 1200);
    }catch{
      showHint("Motion permission request failed", 1000);
    }
  }
}

function updateFloatingButtons() {
  const libPanelWrap = document.getElementById('libPanelWrap');
  const btnDelete = document.getElementById('btnDeleteSelected');
  const btnDone = document.getElementById('btnDoneGlobal');
  const btnClear = document.getElementById('btnClearAll');
  const btnUndo = document.getElementById('btnUndoGlobal');
  const btnRedo = document.getElementById('btnRedoGlobal');
  const globalGroup = document.getElementById('globalGroup');
  const globalActionButtons = document.getElementById('globalActionButtons');

  if (!libPanelWrap || !btnDelete || !btnDone || !btnClear || !btnUndo || !btnRedo || !globalGroup || !globalActionButtons) {
    return;
  }

  const isPanelOpen = libPanelWrap.style.display === 'flex';

  if (isPanelOpen) {
    // Library Panel 打开时，按钮跟随 Panel 右侧边缘
    const panelRect = libPanelWrap.getBoundingClientRect();
    const targetLeft = panelRect.right + 3;

    // 记录按钮原始位置（只记录一次）
    if (!btnDelete.dataset.originalParent) {
      const deleteRect = btnDelete.getBoundingClientRect();
      const doneRect = btnDone.getBoundingClientRect();
      const clearRect = btnClear.getBoundingClientRect();
      const undoRect = btnUndo.getBoundingClientRect();
      const redoRect = btnRedo.getBoundingClientRect();

      btnDelete.dataset.originalTop = deleteRect.top;
      btnDone.dataset.originalTop = doneRect.top;
      btnClear.dataset.originalTop = clearRect.top;
      btnUndo.dataset.originalTop = undoRect.top;
      btnRedo.dataset.originalTop = redoRect.top;

      btnDelete.dataset.originalParent = 'globalActionButtons';
      btnDone.dataset.originalParent = 'globalActionButtons';
      btnClear.dataset.originalParent = 'globalActionButtons';
      btnUndo.dataset.originalParent = 'globalActionButtons';
      btnRedo.dataset.originalParent = 'globalActionButtons';
    }

    // 把按钮移到 body 下，完全脱离 groupContent
    if (btnDelete.parentElement !== document.body) {
      document.body.appendChild(btnDelete);
      document.body.appendChild(btnDone);
      document.body.appendChild(btnClear);
      document.body.appendChild(btnUndo);
      document.body.appendChild(btnRedo);
    }

    // 设置 fixed 定位
    btnDelete.style.position = 'fixed';
    btnDelete.style.left = targetLeft + 'px';
    btnDelete.style.top = btnDelete.dataset.originalTop + 'px';
    btnDelete.style.zIndex = '1000';

    btnDone.style.position = 'fixed';
    btnDone.style.left = targetLeft + 'px';
    btnDone.style.top = btnDone.dataset.originalTop + 'px';
    btnDone.style.zIndex = '1000';

    btnClear.style.position = 'fixed';
    btnClear.style.left = targetLeft + 'px';
    btnClear.style.top = btnClear.dataset.originalTop + 'px';
    btnClear.style.zIndex = '1000';

    btnUndo.style.position = 'fixed';
    btnUndo.style.left = targetLeft + 'px';
    btnUndo.style.top = btnUndo.dataset.originalTop + 'px';
    btnUndo.style.zIndex = '1000';

    btnRedo.style.position = 'fixed';
    btnRedo.style.left = targetLeft + 'px';
    btnRedo.style.top = btnRedo.dataset.originalTop + 'px';
    btnRedo.style.zIndex = '1000';

  } else {
    // Library Panel 关闭时，按钮回到外层操作按钮容器
    if (btnDelete.parentElement !== globalActionButtons) {
      globalActionButtons.appendChild(btnDelete);
      globalActionButtons.appendChild(btnDone);
      globalActionButtons.appendChild(btnClear);
      globalActionButtons.appendChild(btnUndo);
      globalActionButtons.appendChild(btnRedo);
    }

    // 清除样式
    btnDelete.style.position = '';
    btnDelete.style.left = '';
    btnDelete.style.top = '';
    btnDelete.style.zIndex = '';

    btnDone.style.position = '';
    btnDone.style.left = '';
    btnDone.style.top = '';
    btnDone.style.zIndex = '';

    btnClear.style.position = '';
    btnClear.style.left = '';
    btnClear.style.top = '';
    btnClear.style.zIndex = '';

    btnUndo.style.position = '';
    btnUndo.style.left = '';
    btnUndo.style.top = '';
    btnUndo.style.zIndex = '';

    btnRedo.style.position = '';
    btnRedo.style.left = '';
    btnRedo.style.top = '';
    btnRedo.style.zIndex = '';

    // 清除记录
    delete btnDelete.dataset.originalTop;
    delete btnDone.dataset.originalTop;
    delete btnClear.dataset.originalTop;
    delete btnUndo.dataset.originalTop;
    delete btnRedo.dataset.originalTop;

    delete btnDelete.dataset.originalParent;
    delete btnDone.dataset.originalParent;
    delete btnClear.dataset.originalParent;
    delete btnUndo.dataset.originalParent;
    delete btnRedo.dataset.originalParent;
  }
}

function setupLibraryResize() {
  const handle = document.getElementById('libResizeHandle');
  const libPanelWrap = document.getElementById('libPanelWrap');

  if (!handle || !libPanelWrap) return;

  let isResizing = false;
  let startX = 0;
  let startWidth = 0;

  handle.addEventListener('pointerdown', (e) => {
    isResizing = true;
    startX = e.clientX;
    startWidth = libPanelWrap.offsetWidth;
    handle.setPointerCapture(e.pointerId);
    e.preventDefault();
    e.stopPropagation();
  });

  document.addEventListener('pointermove', (e) => {
    if (!isResizing) return;

    const deltaX = e.clientX - startX;
    const newWidth = Math.max(240, Math.min(startWidth + deltaX, window.innerWidth * 0.8));

    libPanelWrap.style.width = newWidth + 'px';
    updateLibraryColumns(newWidth);

    // 实时更新按钮位置 - 每次 resize 都重新计算
    requestAnimationFrame(() => {
      updateFloatingButtons();
    });
  });

  document.addEventListener('pointerup', () => {
    if (isResizing) {
      isResizing = false;
      updateFloatingButtons(); // 最后再更新一次确保位置准确
    }
  });

  document.addEventListener('pointercancel', () => {
    if (isResizing) {
      isResizing = false;
      updateFloatingButtons();
    }
  });
}

// 单击仍然只负责选中/拖动；同一个 sticker 快速点两次才打开功能环。
let stickerTapCandidate = null;
let lastStickerTap = { el: null, time: 0 };
const STICKER_DOUBLE_TAP_MS = 420;
const STICKER_TAP_MOVE_THRESHOLD = 8;

function openStickerFunctionCircle(sticker, tapX, tapY) {
    editbar.style.display = "none";

    const _oldCircle = document.getElementById("funcCircleContainer");
    if (_oldCircle) (_oldCircle._close || (() => _oldCircle.remove()))();

    funcCircleOpen = true;

    document.querySelectorAll(".sticker").forEach(s=>{
        s.classList.remove("selected");
    });
    sticker.classList.add("selected");

    const pad = 88;
    const targetX = (typeof tapX === "number") ? tapX : window.innerWidth / 2;
    const targetY = (typeof tapY === "number") ? tapY : window.innerHeight / 2;
    const _cx = clamp(targetX, pad, window.innerWidth - pad);
    const _cy = clamp(targetY, pad, window.innerHeight - pad);
    showFunctionCircle(_cx, _cy);
}

stage.addEventListener("pointerdown", (e) => {
    const sticker = e.target.closest(".sticker");
    if (!sticker || !alphaHitTest(sticker, e.clientX, e.clientY)) {
        stickerTapCandidate = null;
        return;
    }

    stickerTapCandidate = {
        el: sticker,
        pointerId: e.pointerId,
        x: e.clientX,
        y: e.clientY
    };

    const now = performance.now();
    if (lastStickerTap.el === sticker && now - lastStickerTap.time <= STICKER_DOUBLE_TAP_MS) {
        e.preventDefault();
        e.stopPropagation();
        e.stopImmediatePropagation();
    }
}, true);

stage.addEventListener("pointerup", (e) => {
    const candidate = stickerTapCandidate;
    stickerTapCandidate = null;

    if (!candidate || candidate.pointerId !== e.pointerId) return;
    if (candidate.el !== e.target.closest(".sticker")) return;

    const moved = Math.hypot(e.clientX - candidate.x, e.clientY - candidate.y);
    if (moved > STICKER_TAP_MOVE_THRESHOLD) return;

    const now = performance.now();
    const isDoubleTap =
        lastStickerTap.el === candidate.el &&
        now - lastStickerTap.time <= STICKER_DOUBLE_TAP_MS;

    lastStickerTap = { el: candidate.el, time: now };
    if (!isDoubleTap) return;

    e.preventDefault();
    e.stopPropagation();
    e.stopImmediatePropagation();
    lastStickerTap = { el: null, time: 0 };
    openStickerFunctionCircle(candidate.el, e.clientX, e.clientY);
}, true);

// ======================== 功能环函数 ========================
function showFunctionCircle(initCx, initCy) {
    const funcs = [
        { name: "Distort", png: "distort.png", id: "distort" },
        { name: "Blur",    png: "blur.png",    id: "blur"    },
        { name: "B&W",     png: "bw.png",      id: "bw"      },
        { name: "Noise",   png: "noise.png",   id: "noise"   },
        { name: "Side",    png: "side.png",     id: "side"    },
        { name: "Mosaic",  png: "mosaic.png",   id: "mosaic"  }
    ];

    const _existing = document.getElementById("funcCircleContainer");
    if (_existing) (_existing._close || (() => _existing.remove()))();

    const container = document.createElement("div");
    container.id = "funcCircleContainer";
    container.style.position = "absolute";
    container.style.left = "0";
    container.style.top  = "0";
    container.style.width = "100%";
    container.style.height = "100%";
    container.style.pointerEvents = "none";
    document.body.appendChild(container);

    let ringCx = initCx;
    let ringCy = initCy;
    let radiusPx = 80;
    let centerRotation = 0; // Track center disc rotation

    function closeCircle() {
        document.removeEventListener("pointermove", onDocPointerMove);
        document.removeEventListener("pointerup",   onDocPointerUp);
        document.removeEventListener("pointerdown", onDocOutsideDown);
        if (container.parentNode) container.parentNode.removeChild(container);
        document.querySelectorAll(".sticker.selected").forEach(s => s.classList.remove("selected"));
        funcCircleOpen = false;
    }
    container._close = closeCircle;

    // hit area for ring drag-to-move
    const hitArea = document.createElement("div");
    hitArea.id = "funcCircleHitArea";
    hitArea.style.position = "absolute";
    hitArea.style.borderRadius = "50%";
    hitArea.style.pointerEvents = "auto";
    hitArea.style.cursor = "grab";
    container.appendChild(hitArea);

    function updateHitArea() {
        const size = (radiusPx + 30) * 2;
        hitArea.style.width  = size + "px";
        hitArea.style.height = size + "px";
        hitArea.style.left   = (ringCx - size / 2) + "px";
        hitArea.style.top    = (ringCy - size / 2) + "px";
    }

    // center disc
    const centerImg = document.createElement("img");
    centerImg.src = "assets/round.png";
    centerImg.id  = "funcCircleCenter";
    centerImg.draggable = false;
    centerImg.style.position = "absolute";
    centerImg.style.width  = "50px";
    centerImg.style.height = "50px";
    centerImg.style.pointerEvents = "auto";
    centerImg.style.touchAction = "none";
    centerImg.style.transformOrigin = "center center";
    centerImg.style.left = ringCx + "px";
    centerImg.style.top  = ringCy + "px";
    centerImg.style.zIndex = "2";
    container.appendChild(centerImg);

    function updateCenterRotation() {
        centerImg.style.transform = "translate(-50%, -50%) rotate(" + centerRotation + "rad)";
    }

    // function buttons
    const btnEls = [];
    funcs.forEach((func, i) => {
        const btn = document.createElement("button");
        btn.className = "funcCircleBtn";
        btn.dataset.funcIdx = i;
        btn.style.position = "absolute";
        btn.style.pointerEvents = "auto";
        btn.style.border = "none";
        btn.style.background = "none";
        btn.style.padding = "0";
        btn.style.cursor = "pointer";
        btn.style.transition = "transform 0.1s, filter 0.1s";
        btn.style.transform = "translate(-50%, -50%)";

        const img = document.createElement("img");
        img.src = "assets/" + func.png;
        img.alt = func.name;
        img.style.width = "45px";
        img.style.height = "auto";
        img.draggable = false;

        btn.appendChild(img);
        container.appendChild(btn);
        btnEls.push(btn);

        btn.addEventListener("click", (e) => {
            e.stopPropagation();
            const cx = ringCx, cy = ringCy;
            closeCircle();
            openCircularControl(func.id, cx, cy);
        });
    });

    // arc: 135 deg spread on the left side, centered at 180 deg (pointing left)
    const arcCenter = Math.PI;       // 180 deg = left
    const arcSpread = (135 / 180) * Math.PI; // 135 deg total spread (67.5 deg each side)

    function btnAngle(i) {
        const t = funcs.length > 1 ? i / (funcs.length - 1) : 0.5;
        return arcCenter - arcSpread/2 + t * arcSpread;
    }

    function updateButtons() {
        funcs.forEach((func, i) => {
            const angle = btnAngle(i);
            const bx = ringCx + radiusPx * Math.cos(angle);
            const by = ringCy + radiusPx * Math.sin(angle);
            btnEls[i].style.left = bx + "px";
            btnEls[i].style.top  = by + "px";
            btnEls[i].style.transform = "translate(-50%, -50%)";
        });
    }

    function getSelectedFunctionByRotation() {
        // The center disc points in the direction of centerRotation
        // Find which button is closest to that direction
        let bestIdx = -1;
        let bestDist = Infinity;
        funcs.forEach((func, i) => {
            const ba = btnAngle(i);
            let diff = centerRotation - ba;
            while (diff > Math.PI) diff -= 2 * Math.PI;
            while (diff < -Math.PI) diff += 2 * Math.PI;
            const absDiff = Math.abs(diff);
            if (absDiff < bestDist) {
                bestDist = absDiff;
                bestIdx = i;
            }
        });
        return bestIdx;
    }

    function highlightNearest(pointerAngle) {
        let bestIdx = -1;
        let bestDist = Infinity;
        funcs.forEach((func, i) => {
            const ba = btnAngle(i);
            let diff = pointerAngle - ba;
            while (diff > Math.PI) diff -= 2 * Math.PI;
            while (diff < -Math.PI) diff += 2 * Math.PI;
            const absDiff = Math.abs(diff);
            if (absDiff < bestDist) {
                bestDist = absDiff;
                bestIdx = i;
            }
        });
        btnEls.forEach((btn, i) => {
            if (i === bestIdx) {
                btn.style.transform = "translate(-50%, -50%) scale(1.35)";
                btn.style.filter = "brightness(1.4)";
            } else {
                btn.style.transform = "translate(-50%, -50%) scale(1)";
                btn.style.filter = "none";
            }
        });
        return bestIdx;
    }

    function clearHighlight() {
        btnEls.forEach(btn => {
            btn.style.transform = "translate(-50%, -50%) scale(1)";
            btn.style.filter = "none";
        });
    }

    // interaction state
    let dialDragging = false;
    let hoveredIdx = -1;
    let isMoving = false;
    let moveStartX = 0, moveStartY = 0;
    let moveBaseCx = 0, moveBaseCy = 0;

    // center disc: rotate to select function
    centerImg.addEventListener("pointerdown", (e) => {
        dialDragging = true;
        hoveredIdx = -1;
        e.preventDefault();
        e.stopPropagation();
        centerImg.setPointerCapture(e.pointerId);
        const angle = Math.atan2(e.clientY - ringCy, e.clientX - ringCx);
        centerRotation = angle;
        updateCenterRotation();
        hoveredIdx = highlightNearest(angle);
    });

    // ring area: drag to move
    hitArea.addEventListener("pointerdown", (e) => {
        if (e.target !== hitArea) return;
        isMoving = true;
        e.preventDefault();
        e.stopPropagation();
        moveStartX = e.clientX;
        moveStartY = e.clientY;
        moveBaseCx = ringCx;
        moveBaseCy = ringCy;
        hitArea.setPointerCapture(e.pointerId);
        hitArea.style.cursor = "grabbing";
    });

    function onDocPointerMove(e) {
        if (dialDragging) {
            const angle = Math.atan2(e.clientY - ringCy, e.clientX - ringCx);
            centerRotation = angle;
            updateCenterRotation();
            hoveredIdx = highlightNearest(angle);
            return;
        }
        if (isMoving) {
            const dx = e.clientX - moveStartX;
            const dy = e.clientY - moveStartY;
            ringCx = moveBaseCx + dx;
            ringCy = moveBaseCy + dy;
            centerImg.style.left = ringCx + "px";
            centerImg.style.top  = ringCy + "px";
            updateButtons();
            updateHitArea();
        }
    }

    function onDocPointerUp() {
        if (dialDragging) {
            dialDragging = false;
            if (hoveredIdx >= 0) {
                const func = funcs[hoveredIdx];
                const cx = ringCx, cy = ringCy;
                closeCircle();
                openCircularControl(func.id, cx, cy);
                return;
            }
            clearHighlight();
        }
        if (isMoving) {
            isMoving = false;
            hitArea.style.cursor = "grab";
        }
    }

    document.addEventListener("pointermove", onDocPointerMove);
    document.addEventListener("pointerup", onDocPointerUp);

    // pinch to resize
    let pinchStartDist = 0;
    let pinchStartRadius = 0;

    container.addEventListener("touchstart", e => {
        if (e.touches.length === 2) {
            const dx = e.touches[1].clientX - e.touches[0].clientX;
            const dy = e.touches[1].clientY - e.touches[0].clientY;
            pinchStartDist = Math.hypot(dx, dy);
            pinchStartRadius = radiusPx;
        }
    });

    container.addEventListener("touchmove", e => {
        if (e.touches.length === 2) {
            e.preventDefault();
            const dx = e.touches[1].clientX - e.touches[0].clientX;
            const dy = e.touches[1].clientY - e.touches[0].clientY;
            const newDist = Math.hypot(dx, dy);
            radiusPx = Math.max(40, Math.min(200, pinchStartRadius + newDist - pinchStartDist));
            updateButtons();
            updateHitArea();
        }
    });

    // initial layout
    updateButtons();
    updateHitArea();
    updateCenterRotation();

    // close on outside click
    document.addEventListener("pointerdown", onDocOutsideDown);
    function onDocOutsideDown(e) {
        if (e.target.closest("#funcCircleContainer")) return;
        if (e.target.closest(".sticker")) return;
        closeCircle();
    }
}

// ======================== 功能环 → 调用真实编辑函数 ========================
function closePanels() {
    brushPanel.style.display = "none";
    sidebar.style.display = "none";
}

function openCircularControl(funcId, cx, cy) {
    if (!selected) return;
    closePanels();
    switch(funcId){
        case "distort":
            editMode = "stretch";
            brushPanel.style.display = "flex";
            showHint("Distort brush: drag on sticker", 900);
            break;
        case "blur":
            editMode = "mblur";
            brushPanel.style.display = "flex";
            showHint("Blur brush: drag on sticker", 900);
            break;
        case "bw":
            applyBlackWhite();
            showHint("B&W applied", 650);
            break;
        case "noise": {
            const amt = Math.abs(parseInt(strengthEl.value, 10)) / 100;
            applyNoise(clamp(amt * 0.35, 0.05, 0.45));
            showHint("Noise applied", 650);
            break;
        }
        case "side": {
            const on = (sidebar.style.display !== "flex");
            sidebar.style.display = on ? "flex" : "none";
            if (on){
                selected._sideBase = null;
                const maxLen = parseInt(sideLenEl.max, 10) || 60;
                ensureCanvasPadding(selected, 60 * 2 + 10);
                snapshotStickerBase(selected);
                previewSide();
                showHint("Side controls", 700);
            } else {
                showHint("Side panel closed", 600);
            }
            break;
        }
        case "mosaic":
            editMode = "mosaic";
            brushPanel.style.display = "flex";
            showHint("Mosaic brush: drag on sticker", 900);
            break;
    }
}

// ======================== 圆圈控件生成函数 ========================
function showCircularSelector(cx, cy, minVal, maxVal, imgPathPrefix, applyFunc) {
    const container = document.createElement("div");
    container.style.position = "absolute";
    container.style.left = "0px";
    container.style.top = "0px";
    container.style.width = "100%";
    container.style.height = "100%";
    container.style.pointerEvents = "none";
    document.body.appendChild(container);

    const radiusPx = 80;
    const total = maxVal - minVal + 1;
    const angleStep = 2*Math.PI / total;

    for(let i = minVal; i <= maxVal; i++) {
        const btn = document.createElement("button");
        btn.className = "subBtn";
        btn.style.position = "absolute";
        btn.style.pointerEvents = "auto";
        btn.style.border = "none";
        btn.style.background = "none";
        btn.style.padding = "0";
        btn.style.transform = "translate(-50%, -50%)";

        const angle = (i - minVal)*angleStep - Math.PI/2;
        const x = cx + radiusPx*Math.cos(angle);
        const y = cy + radiusPx*Math.sin(angle);
        btn.style.left = x+"px";
        btn.style.top = y+"px";

        const img = document.createElement("img");
        img.src = `${imgPathPrefix}_${i}.png`;
        img.style.width = "30px";
        img.style.height = "30px";
        btn.appendChild(img);

        btn.addEventListener("click", () => {
            applyFunc(i);
            document.body.removeChild(container);
        });

        container.appendChild(btn);
    }

    container.addEventListener("click", e => {
        if(e.target === container) document.body.removeChild(container);
    });
}
